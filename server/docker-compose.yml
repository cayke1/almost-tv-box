version: '3.8'

services:
  tv-server:
    build: .
    container_name: tv-os-server
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - ELECTRON_HOST=host.docker.internal
      - ELECTRON_WS_PORT=8081
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
